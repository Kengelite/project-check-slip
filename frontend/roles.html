<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้าน - จัดการสิทธิ์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        // 1. ถ้าไม่มี Token (ยังไม่ล็อกอิน) ให้เตะไปหน้า Login
        if (!token) {
            window.location.replace('/login');
        }
        // 2. ถ้าล็อกอินแล้ว แต่ "ไม่ใช่ Super Admin" ให้เตะกลับไปหน้า Dashboard
        else if (role !== 'Super Admin') {
            window.location.replace('/dashboard'); // หรือแจ้งเตือนก่อนค่อยเตะก็ได้ครับ
        }
    </script>
</head>

<body class="bg-gray-100 text-gray-800" x-data="roleManager()">

    <div x-show="showToast" x-transition.opacity
         class="fixed top-5 right-5 z-[60] bg-gray-800 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3" x-cloak>
        <i class="fa-solid fa-circle-check text-green-400 text-xl"></i>
        <span x-text="toastMessage" class="font-medium"></span>
    </div>

    <div x-show="isEditModalOpen"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" x-transition.opacity
        x-cloak>
        <div @click.away="!isSaving && (isEditModalOpen = false)"
            class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800">
                    <i class="fa-solid fa-shield-halved text-blue-500 mr-2"></i>
                    <span x-text="modalMode === 'create' ? 'เพิ่มกลุ่มสิทธิ์ใหม่' : 'แก้ไขรายละเอียดสิทธิ์'"></span>
                </h3>
                <button @click="isEditModalOpen = false" :disabled="isSaving" class="text-gray-400 hover:text-gray-600 disabled:opacity-50">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อกลุ่มสิทธิ์ (Role Name) <span class="text-red-500">*</span></label>
                    <input type="text" x-model="editForm.name" placeholder="เช่น Manager, Supervisor"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียด</label>
                    <textarea x-model="editForm.desc" rows="3" placeholder="อธิบายหน้าที่ของกลุ่มสิทธิ์นี้..."
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:border-blue-500"></textarea>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50">
                <button @click="isEditModalOpen = false" :disabled="isSaving"
                    class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg font-medium disabled:opacity-50">ยกเลิก</button>
                <button @click="saveRole()" :disabled="isSaving || !editForm.name.trim()"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-50 flex items-center justify-center min-w-[80px]">
                    <span x-show="!isSaving">บันทึก</span>
                    <i x-show="isSaving" class="fa-solid fa-spinner animate-spin"></i>
                </button>
            </div>
        </div>
    </div>

    <div x-show="isDeleteModalOpen"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" x-transition.opacity
        x-cloak>
        <div @click.away="!isDeleting && (isDeleteModalOpen = false)"
            class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-shield-virus text-3xl text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบกลุ่มสิทธิ์?</h3>
            <p class="text-gray-500 mb-6 text-sm">คุณจะไม่สามารถลบกลุ่มสิทธิ์นี้ได้ หากยังมีผู้ใช้งานอยู่ในกลุ่มนี้</p>
            <div class="flex gap-3">
                <button @click="isDeleteModalOpen = false" :disabled="isDeleting"
                    class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium disabled:opacity-50">ยกเลิก</button>
                <button @click="confirmDelete()" :disabled="isDeleting"
                    class="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium disabled:opacity-50 flex justify-center items-center">
                    <span x-show="!isDeleting">ยืนยันลบ</span>
                    <i x-show="isDeleting" class="fa-solid fa-spinner animate-spin"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="min-h-screen flex w-full relative overflow-hidden">

        <div x-show="sidebarOpen" @click="sidebarOpen = false" x-transition.opacity
            class="fixed inset-0 bg-black/50 z-20 md:hidden" x-cloak></div>

        {% include 'nav.html' %}

        <main class="flex-1 flex flex-col h-screen min-w-0 overflow-hidden">
            <header
                class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8 shadow-sm">
                <div class="flex items-center gap-3">
                    <button @click="sidebarOpen = true"
                        class="md:hidden text-gray-600 hover:text-gray-900 focus:outline-none">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-lg md:text-xl font-semibold text-gray-800 truncate">จัดการสิทธิ์ (Roles)</h1>
                </div>
                {% include 'profile.html' %}
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50 no-scrollbar">

                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold text-gray-700">กลุ่มสิทธิ์ในระบบ</h2>
                    <button @click="openCreate()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl shadow-sm font-medium transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">เพิ่มกลุ่มสิทธิ์</span>
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    
                    <template x-if="isLoading">
                        <div class="col-span-full p-12 text-center text-gray-400 bg-white rounded-xl shadow-sm border border-gray-100">
                            <i class="fa-solid fa-spinner animate-spin text-2xl mb-2 text-blue-500"></i>
                            <p>กำลังโหลดข้อมูลกลุ่มสิทธิ์...</p>
                        </div>
                    </template>

                    <template x-if="!isLoading && roles.length === 0">
                        <div class="col-span-full p-12 text-center text-gray-400 bg-white rounded-xl shadow-sm border border-gray-100">
                            <p>ไม่พบข้อมูลกลุ่มสิทธิ์ในระบบ</p>
                        </div>
                    </template>

                    <template x-for="role in roles" :key="role.id">
                        <div x-show="!isLoading"
                            class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full" :class="role.color"></div>

                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-gray-800" x-text="role.name"></h3>
                                
                                <div class="flex gap-1">
                                    <button @click="openEdit(role)" title="แก้ไข"
                                        class="text-gray-400 hover:text-blue-500 w-8 h-8 flex justify-center items-center rounded-lg hover:bg-gray-100 transition-colors">
                                        <i class="fa-solid fa-pen text-sm"></i>
                                    </button>
                                    <button @click="openDelete(role.id)" title="ลบ"
                                        class="text-gray-400 hover:text-red-500 w-8 h-8 flex justify-center items-center rounded-lg hover:bg-gray-100 transition-colors">
                                        <i class="fa-solid fa-trash text-sm"></i>
                                    </button>
                                </div>
                            </div>

                            <p class="text-sm text-gray-500 mb-6 flex-1" x-text="role.desc"></p>

                            <div class="border-t border-gray-100 pt-4 flex justify-between items-center">
                                <div class="text-xs font-semibold px-2.5 py-1 rounded-lg" :class="role.badgeClass">
                                    ผู้ใช้งาน <span x-text="role.usersCount"></span> คน
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

    <script>
        function roleManager() {
            return {
                sidebarOpen: false,
                roles: [], 
                isLoading: false,
                isSaving: false,
                isDeleting: false,

                // Modal States
                isEditModalOpen: false,
                isDeleteModalOpen: false,
                modalMode: 'create', // 'create' หรือ 'edit'
                deleteTargetId: null,
                editForm: { id: null, name: '', desc: '' },

                // Toast States
                showToast: false,
                toastMessage: '',

                async init() {
                    if (!localStorage.getItem('token')) {
                        window.location.href = '/login';
                        return;
                    }
                    await this.fetchRoles();
                },

                triggerToast(message) {
                    this.toastMessage = message;
                    this.showToast = true;
                    setTimeout(() => { this.showToast = false; }, 3000);
                },

                // =====================================
                // 🌐 API: ดึงข้อมูล
                // =====================================
                async fetchRoles() {
                    this.isLoading = true;
                    try {
                        const response = await fetch('/api/roles', {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${localStorage.getItem('token')}`,
                                'Content-Type': 'application/json'
                            }
                        });

                        if (response.status === 401) {
                            alert('Session หมดอายุ กรุณาเข้าสู่ระบบใหม่');
                            this.logout();
                            return;
                        }

                        if (!response.ok) throw new Error('Fetch failed');

                        const json = await response.json();
                        
                        const colorThemes = [
                            { color: 'bg-purple-500', badgeClass: 'bg-purple-50 text-purple-600' },
                            { color: 'bg-blue-500', badgeClass: 'bg-blue-50 text-blue-600' },
                            { color: 'bg-green-500', badgeClass: 'bg-green-50 text-green-600' },
                            { color: 'bg-orange-500', badgeClass: 'bg-orange-50 text-orange-600' }
                        ];

                        this.roles = json.data.map((item, index) => {
                            const theme = colorThemes[index % colorThemes.length];
                            return {
                                id: item.id,
                                name: item.name,
                                desc: item.desc || '',
                                usersCount: item.users_count || 0, 
                                color: theme.color,
                                badgeClass: theme.badgeClass
                            };
                        });

                    } catch (error) {
                        console.error('Error fetching roles:', error);
                    } finally {
                        this.isLoading = false;
                    }
                },

                // =====================================
                // ✏️ API: สร้าง / แก้ไข
                // =====================================
                openCreate() {
                    this.modalMode = 'create';
                    this.editForm = { id: null, name: '', desc: '' };
                    this.isEditModalOpen = true;
                },

                openEdit(role) {
                    this.modalMode = 'edit';
                    this.editForm = { ...role };
                    this.isEditModalOpen = true;
                },
                
                async saveRole() {
                    if (!this.editForm.name.trim()) return;
                    
                    this.isSaving = true;
                    try {
                        const url = this.modalMode === 'create' ? '/api/roles' : `/api/roles/${this.editForm.id}`;
                        const method = this.modalMode === 'create' ? 'POST' : 'PUT';

                        const response = await fetch(url, {
                            method: method,
                            headers: {
                                'Authorization': `Bearer ${localStorage.getItem('token')}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: this.editForm.name,
                                desc: this.editForm.desc
                            })
                        });

                        if (response.status === 401) {
                            alert('Session หมดอายุ กรุณาเข้าสู่ระบบใหม่');
                            this.logout();
                            return;
                        }

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.detail || 'เกิดข้อผิดพลาดในการบันทึกข้อมูล');
                        }

                        this.isEditModalOpen = false;
                        
                        // เรียกใช้งาน Toast สีเขียว
                        this.triggerToast(this.modalMode === 'create' ? 'เพิ่มกลุ่มสิทธิ์ใหม่เรียบร้อย!' : 'อัปเดตกลุ่มสิทธิ์สำเร็จ!');

                        await this.fetchRoles(); // ดึงข้อมูลใหม่มาแสดง

                    } catch (error) {
                        console.error('Save error:', error);
                        alert(error.message);
                    } finally {
                        this.isSaving = false;
                    }
                },

                // =====================================
                // 🗑️ API: ลบข้อมูล
                // =====================================
                openDelete(id) {
                    this.deleteTargetId = id;
                    this.isDeleteModalOpen = true;
                },

                async confirmDelete() {
                    if (!this.deleteTargetId) return;
                    
                    this.isDeleting = true;
                    try {
                        const response = await fetch(`/api/roles/${this.deleteTargetId}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${localStorage.getItem('token')}`,
                                'Content-Type': 'application/json'
                            }
                        });

                        if (response.status === 401) {
                            alert('Session หมดอายุ กรุณาเข้าสู่ระบบใหม่');
                            this.logout();
                            return;
                        }

                        if (!response.ok) {
                            const errorData = await response.json();
                            // จะแสดง Error ที่เราเขียนดักไว้ เช่น "ไม่สามารถลบได้ เนื่องจากมีผู้ใช้งานอยู่ 5 คน"
                            throw new Error(errorData.detail || 'เกิดข้อผิดพลาดในการลบกลุ่มสิทธิ์');
                        }

                        this.isDeleteModalOpen = false;
                        this.deleteTargetId = null;

                        // เรียกใช้งาน Toast
                        this.triggerToast('ลบกลุ่มสิทธิ์ออกจากระบบแล้ว!');

                        await this.fetchRoles();

                    } catch (error) {
                        console.error('Delete error:', error);
                        alert(error.message);
                    } finally {
                        this.isDeleting = false;
                    }
                },

                logout() {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                }
            }
        }
    </script>
</body>

</html>
