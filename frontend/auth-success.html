<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังเข้าสู่ระบบ...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="text-center">
        <svg class="animate-spin h-12 w-12 text-blue-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-xl font-semibold text-gray-800">กำลังนำคุณเข้าสู่ระบบ...</h2>
        <p class="text-gray-500 mt-2">กรุณารอสักครู่</p>
    </div>

    <script>
        // ดึงค่า token และ role จาก URL 
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const role = urlParams.get('role');

        if (token) {
            // บันทึกลง LocalStorage ของเบราว์เซอร์
            localStorage.setItem('token', token);
            if (role) {
                localStorage.setItem('role', role);
            }
            
            // เด้งไปหน้า Dashboard อัตโนมัติใน 1 วินาที
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000); 
        } else {
            // ถ้าพารามิเตอร์ผิดพลาด ให้กลับไปหน้า Login
            window.location.href = '/login?error=missing_token';
        }
    </script>
</body>
</html>
