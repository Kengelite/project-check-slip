<script>
    if (!localStorage.getItem('token')) {
        window.location.replace('/login'); // เตะกลับไปหน้า Login ทันที
    }
</script>

<style> [x-cloak] { display: none !important; } </style>

<aside x-data="{ userRole: localStorage.getItem('role') }" 
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed inset-y-0 left-0 w-64 bg-gray-900 text-white flex flex-col shadow-2xl z-30 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0">

    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-800 bg-gray-950">
        <div class="flex items-center">
            <i class="fa-solid fa-bolt text-blue-500 mr-3"></i>
            <span class="text-lg font-bold tracking-wider">SLIP ADMIN</span>
        </div>
        <button @click="sidebarOpen = false" class="md:hidden text-gray-400 hover:text-white">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 px-2">รายการสแกน</div>

        <a href="/dashboard" class="w-full flex items-center px-4 py-3 rounded-lg transition-all font-medium 
            {% if request.url.path == '/dashboard' or request.url.path == '/' %} bg-blue-600 text-white shadow-lg 
            {% else %} text-gray-300 hover:bg-gray-800 hover:text-white {% endif %}">
            <i class="fa-solid fa-chart-pie w-6"></i> ภาพรวม (Dashboard)
        </a>

        <a href="/passed" class="w-full flex items-center px-4 py-3 rounded-lg transition-all font-medium 
            {% if request.url.path == '/passed' %} bg-blue-600 text-white shadow-lg 
            {% else %} text-gray-300 hover:bg-gray-800 hover:text-white {% endif %}">
            <i class="fa-solid fa-circle-check w-6 {% if request.url.path != '/passed' %}text-green-500{% endif %}"></i>
            สลิปผ่าน
        </a>

        <a href="/failed" class="w-full flex items-center px-4 py-3 rounded-lg transition-all font-medium 
            {% if request.url.path == '/failed' %} bg-blue-600 text-white shadow-lg 
            {% else %} text-gray-300 hover:bg-gray-800 hover:text-white {% endif %}">
            <i class="fa-solid fa-circle-xmark w-6 {% if request.url.path != '/failed' %}text-red-500{% endif %}"></i>
            สลิปไม่ผ่าน
        </a>

        <template x-if="userRole === 'Super Admin'">
            <div x-cloak>
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-6 px-2">ระบบจัดการ</div>

                <a href="/key" class="w-full flex items-center px-4 py-3 rounded-lg transition-all font-medium 
                    {% if request.url.path == '/key' %} bg-blue-600 text-white shadow-lg 
                    {% else %} text-gray-300 hover:bg-gray-800 hover:text-white {% endif %}">
                    <i class="fa-solid fa-key w-6 {% if request.url.path != '/key' %}text-yellow-500{% endif %}"></i>
                    จัดการ key
                </a>

                <a href="/users" class="w-full flex items-center px-4 py-3 rounded-lg transition-all font-medium 
                    {% if request.url.path == '/users' %} bg-blue-600 text-white shadow-lg 
                    {% else %} text-gray-300 hover:bg-gray-800 hover:text-white {% endif %}">
                    <i class="fa-solid fa-users w-6"></i> จัดการ Users
                </a>

                <a href="/roles" class="w-full flex items-center px-4 py-3 rounded-lg transition-all font-medium 
                    {% if request.url.path == '/roles' %} bg-blue-600 text-white shadow-lg 
                    {% else %} text-gray-300 hover:bg-gray-800 hover:text-white {% endif %}">
                    <i class="fa-solid fa-shield-halved w-6"></i> จัดการ Roles
                </a>
            </div>
        </template>
    </nav>

    <div class="p-4 border-t border-gray-800">
        <button @click="logout()"
            class="w-full flex items-center px-4 py-2 text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition-colors font-medium">
            <i class="fa-solid fa-arrow-right-from-bracket w-6"></i>
            ออกจากระบบ
        </button>
    </div>
</aside>
