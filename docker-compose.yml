version: '3.8'

services:
  app:
    build: .
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    # รัน uvicorn 1 ตัวต่อ 1 instance (เดี๋ยวเราจะสั่งแยกร่างทีหลัง)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app