version: '3.8'

services:
  app:
    build: .
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    # รัน uvicorn 1 ตัวต่อ 1 instance (เดี๋ยวเราจะสั่งแยกร่างทีหลัง)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: slip_db
    command: 
      - "postgres"
      - "-c"
      - "timezone=Asia/Bangkok"      
      - "-c"
      - "log_timezone=Asia/Bangkok"  
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: